name: Check Repository

on:
  push:
    branches:
      - master  

  schedule:
    # daily at 3:00 UTC
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      debug:
        description: Enable debug logging for repository checks
        required: false
        type: boolean
        default: false
      log:
        description: Legacy logging flag (same as debug)
        required: false
        type: boolean
        default: false

  pull_request:

permissions:
  contents: read

env:
  CHECK_REPOSITORY_DEBUG: ${{ (github.event.inputs.debug == 'true' || github.event.inputs.log == 'true') && 'true' || 'false' }}
  CHECK_REPOSITORY_LOG: ${{ github.event.inputs.log == 'true' && 'true' || 'false' }}

jobs:
  checkLatestJson:
    name: Check sources-dist.json JSON formatting
    if: github.repository == 'ioBroker/ioBroker.repositories'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkJsonFormatting.js sources-dist.json

  checkStableJson:
    name: Check sources-dist-stable.json JSON formatting
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkJsonFormatting.js sources-dist-stable.json

  checkLatestAttributes:
    name: Check sources-dist.json attributes
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkLatestAttributes.js

  checkAdapterNames:
    name: Check adapter names
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestAttributes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkAdapterNames.js

  checkStableAttributes:
    name: Check sources-dist-stable.json attributes
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson, checkStableJson, checkLatestAttributes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkStableAttributes.js

  checkLatestSortOrder:
    name: Check sources-dist.json sort order
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkLatestSortOrder.js

  checkStableSortOrder:
    name: Check sources-dist-stable.json sort order
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkStableJson]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkStableSortOrder.js

  checkStableInLatest:
    name: Check stable adapters present in latest
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson, checkStableJson]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkStableInLatest.js

  checkAdapterRepositoryFiles:
    name: Check adapter repository files
    if: github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson, checkStableJson, checkLatestAttributes, checkAdapterNames, checkStableAttributes, checkLatestSortOrder, checkStableSortOrder, checkStableInLatest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node lib/checkRepository_checkAdapterRepositoryFiles.js

  report:
    name: Final Report
    if: always() && github.repository == 'ioBroker/ioBroker.repositories'
    needs: [checkLatestJson, checkStableJson, checkLatestAttributes, checkAdapterNames, checkStableAttributes, checkLatestSortOrder, checkStableSortOrder, checkStableInLatest, checkAdapterRepositoryFiles]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "checkLatestJson:       ${{ needs.checkLatestJson.result }}"
          echo "checkStableJson:       ${{ needs.checkStableJson.result }}"
          echo "checkLatestAttributes: ${{ needs.checkLatestAttributes.result }}"
          echo "checkAdapterNames:     ${{ needs.checkAdapterNames.result }}"
          echo "checkStableAttributes: ${{ needs.checkStableAttributes.result }}"
          echo "checkLatestSortOrder:  ${{ needs.checkLatestSortOrder.result }}"
          echo "checkStableSortOrder:  ${{ needs.checkStableSortOrder.result }}"
          echo "checkStableInLatest:   ${{ needs.checkStableInLatest.result }}"
          echo "checkAdapterRepositoryFiles: ${{ needs.checkAdapterRepositoryFiles.result }}"

          if [[ "${{ needs.checkLatestJson.result }}" == "failure" ]] || \
             [[ "${{ needs.checkStableJson.result }}" == "failure" ]] || \
             [[ "${{ needs.checkLatestAttributes.result }}" == "failure" ]] || \
             [[ "${{ needs.checkAdapterNames.result }}" == "failure" ]] || \
             [[ "${{ needs.checkStableAttributes.result }}" == "failure" ]] || \
             [[ "${{ needs.checkLatestSortOrder.result }}" == "failure" ]] || \
             [[ "${{ needs.checkStableSortOrder.result }}" == "failure" ]] || \
             [[ "${{ needs.checkStableInLatest.result }}" == "failure" ]] || \
             [[ "${{ needs.checkAdapterRepositoryFiles.result }}" == "failure" ]]; then
            echo "One or more checks failed!"
            exit 1
          fi
          echo "All checks passed!"
